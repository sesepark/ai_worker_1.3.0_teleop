/**:
  arm_l_joint_trajectory_executor:
    ros__parameters:
      joint_names:
        - arm_l_joint1
        - arm_l_joint2
        - arm_l_joint3
        - arm_l_joint4
        - arm_l_joint5
        - arm_l_joint6
        - arm_l_joint7
      step_names: [step0, step1]
      step0: [1.57, 0.0, 0.0, -2.8, 0.0, 0.0, 0.0]
      step1: [0.0, 0.0, 0.0, -1.57, 0.0, 0.0, 0.0]
      duration: 5.0
      position_tolerance: 0.1
      velocity_tolerance: 0.01
      action_topic: '/arm_l_controller/follow_joint_trajectory'
      joint_states_topic: '/joint_states'

